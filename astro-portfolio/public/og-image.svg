<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient matching site theme -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="60%" style="stop-color:#0a0a0a"/>
      <stop offset="85%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>

    <!-- Accent gradient for text -->
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9f5c"/>
      <stop offset="100%" style="stop-color:#6ee7de"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="157.5" x2="1200" y2="157.5" stroke="#6ee7de" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#6ee7de" stroke-width="1"/>
    <line x1="0" y1="472.5" x2="1200" y2="472.5" stroke="#6ee7de" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#6ee7de" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#6ee7de" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#6ee7de" stroke-width="1"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="100" cy="100" r="80" fill="#6366f1" opacity="0.15" filter="url(#glow)"/>
  <circle cx="1100" cy="530" r="60" fill="#38bdf8" opacity="0.1" filter="url(#glow)"/>

  <!-- Terminal window -->
  <g transform="translate(100, 140)">
    <!-- Terminal window frame -->
    <rect x="0" y="0" width="400" height="280" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

    <!-- Terminal title bar -->
    <rect x="0" y="0" width="400" height="40" rx="12" fill="#161b22"/>
    <rect x="0" y="20" width="400" height="20" fill="#161b22"/>
    <circle cx="25" cy="20" r="8" fill="#ff5f56"/>
    <circle cx="50" cy="20" r="8" fill="#ffbd2e"/>
    <circle cx="75" cy="20" r="8" fill="#27ca40"/>

    <!-- Terminal content -->
    <text x="25" y="80" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="#6ee7de">❯ npm run dev</text>

    <text x="25" y="120" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#8b949e">
      <tspan x="25" dy="0">  reverb256.ca</tspan>
      <tspan x="25" dy="25">  ✓ 9 pages built</tspan>
      <tspan x="25" dy="25">  ✓ sitemap generated</tspan>
      <tspan x="25" dy="25">  ✓ Local server: 3000</tspan>
    </text>

    <!-- Blinking cursor -->
    <rect x="25" y="210" width="10" height="18" fill="#ff9f5c">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Status badges -->
    <rect x="25" y="245" width="80" height="24" rx="4" fill="#238636"/>
    <text x="65" y="261" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">Rust</text>

    <rect x="115" y="245" width="90" height="24" rx="4" fill="#3178c6"/>
    <text x="160" y="261" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">TypeScript</text>

    <rect x="215" y="245" width="70" height="24" rx="4" fill="#5d7a96"/>
    <text x="250" y="261" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">NixOS</text>
  </g>

  <!-- Main content on the right -->
  <g transform="translate(560, 180)">
    <!-- Tagline -->
    <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="24" fill="#8b949e">Developer Portfolio</text>

    <!-- Name with gradient -->
    <text x="0" y="70" font-family="'Bebas Neue', sans-serif" font-size="100" font-weight="bold" fill="url(#accent-gradient)">Reverb256</text>

    <!-- Tagline/description -->
    <text x="0" y="120" font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#c8ced8">
      Building with
    </text>
    <text x="0" y="155" font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#ff9f5c" font-weight="600">Rust</text>
    <text x="65" y="155" font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#c8ced8">·</text>
    <text x="90" y="155" font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#6ee7de" font-weight="600">TypeScript</text>
    <text x="210" y="155" font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#c8ced8">·</text>
    <text x="235" y="155" font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#6366f1" font-weight="600">NixOS</text>

    <!-- Stats -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="70" y="25" font-family="Inter, sans-serif" font-size="28" font-weight="bold" fill="#ff9f5c" text-anchor="middle">7+</text>
      <text x="70" y="48" font-family="Inter, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Projects</text>

      <rect x="160" y="0" width="140" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="230" y="25" font-family="Inter, sans-serif" font-size="28" font-weight="bold" fill="#6ee7de" text-anchor="middle">4</text>
      <text x="230" y="48" font-family="Inter, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Host Cluster</text>

      <rect x="320" y="0" width="140" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="390" y="25" font-family="Inter, sans-serif" font-size="28" font-weight="bold" fill="#6366f1" text-anchor="middle">AI</text>
      <text x="390" y="48" font-family="Inter, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">First</text>
    </g>

    <!-- URL -->
    <text x="0" y="310" font-family="'Fira Code', monospace" font-size="18" fill="#6ee7de">reverb256.ca</text>
  </g>

  <!-- Bottom accent line -->
  <line x1="100" y1="580" x2="1100" y2="580" stroke="url(#accent-gradient)" stroke-width="4" stroke-linecap="round"/>
</svg>
